<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart Transaction Stack</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <header class="shell topbar">
      <div>
        <p class="eyebrow">Live evidence console</p>
        <h1>Smart Transaction Stack</h1>
      </div>
      <button id="refresh" type="button" class="button">Refresh</button>
    </header>

    <main class="shell layout">
      <section class="metrics" aria-label="Summary">
        <article class="metric">
          <span>Total</span>
          <strong id="total">-</strong>
        </article>
        <article class="metric">
          <span>Finalized</span>
          <strong id="finalized">-</strong>
        </article>
        <article class="metric">
          <span>Failed</span>
          <strong id="failed">-</strong>
        </article>
        <article class="metric">
          <span>Updated</span>
          <strong id="updated">-</strong>
        </article>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Submissions</p>
            <h2>Lifecycle Log</h2>
          </div>
          <p id="status" class="status">Loading live evidence</p>
        </div>
        <div id="empty" class="empty" hidden>
          <h3>No submissions recorded</h3>
          <p>Run <code>pnpm dev -- run --count 10 --live</code> after funding the configured payer.</p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Signature</th>
                <th>Status</th>
                <th>Fault</th>
                <th>Slots</th>
                <th>Latency</th>
                <th>Tip</th>
                <th>Failure</th>
                <th>Agent</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/assets/app.js" type="module"></script>
  </body>
</html>
